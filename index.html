<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissor Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Rock Paper Scissors</h1>
    </header>
    <div class="options">
        <button class="option" id="rock">
            <img src="./images/rock.png" alt="">
        </button>
        <button class="option" id="paper">
            <img src="./images/paper.png" alt="">
        </button>
        <button class="option" id="scissors">
            <img src="./images/scissors.png" alt="">
        </button>
    </div>
    <div class="msg-container">
        <p id="msg">Play your move!</p>
    </div>
    <div class="score-board">
        <div class="score">
            <p>Your Score:</p>
            <p id="user-score">0</p>
        </div>
                <div class="score">
                <p>Computer's Score:</p>
            <p id="comp-score">0</p>
        </div>
    </div>
    <div class="rstcontainer">
    <button class="rstgm">Reset Game</button>
    </div>
    <footer>
        <p>
            © 2026 Rohit |
            <a id="ftr" href="https://github.com/rohitdutta-dev" target="_blank">GitHub</a>
        </p>
    </footer>
    <script src="main.js"></script>
</body>
</html>
